<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>I am sorry, Aliss 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
}

body {
  font-family: 'Cormorant Garamond', serif;
  background: #fdf6f8;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Petal canvas ── */
#petals {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

/* ── Stage ── */
.stage {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(1.5rem, 5vw, 5rem);
  padding: 2rem;
  opacity: 0;
  animation: fadeUp 2.2s ease forwards 0.4s;
}

@keyframes fadeUp {
  to { opacity: 1; }
}

/* ── Center text ── */
.center {
  text-align: center;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.2rem;
}

.sorry {
  font-size: clamp(2rem, 6vw, 3.6rem);
  font-weight: 300;
  font-style: italic;
  color: #c2697e;
  letter-spacing: 0.04em;
  line-height: 1.15;
  animation: fadeUp 2.2s ease forwards 1s;
  opacity: 0;
}

.name {
  font-size: clamp(2.8rem, 8vw, 5rem);
  font-weight: 300;
  color: #3d2028;
  letter-spacing: 0.06em;
  animation: fadeUp 2.2s ease forwards 1.5s;
  opacity: 0;
}

.dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: #d9a0ae;
  margin: 0 auto;
  animation: fadeUp 2.2s ease forwards 2.2s;
  opacity: 0;
}

.sub {
  font-size: clamp(0.85rem, 2vw, 1.05rem);
  color: #c4a0a9;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  font-weight: 300;
  animation: fadeUp 2.2s ease forwards 2.6s;
  opacity: 0;
}

/* ── SVG flowers ── */
.flower-wrap {
  flex-shrink: 0;
  animation: fadeUp 2.4s ease forwards 0.8s;
  opacity: 0;
}

.flower-wrap svg {
  display: block;
  width: clamp(130px, 20vw, 220px);
  height: auto;
}

/* ── Mobile stack ── */
@media (max-width: 600px) {
  .stage {
    flex-direction: column;
    gap: 1.8rem;
    overflow: hidden;
  }
  .flower-wrap svg { width: clamp(110px, 38vw, 160px); }
  .flower-wrap.rose { order: -1; }
  .flower-wrap.sakura { order: 1; }
  .center { order: 0; }
}
</style>
</head>
<body>

<canvas id="petals"></canvas>

<div class="stage">

  <!-- ══ SAKURA BRANCH (left) ══ -->
  <div class="flower-wrap sakura">
    <svg viewBox="0 0 200 340" xmlns="http://www.w3.org/2000/svg" aria-label="Branche de sakura">

      <!-- Branch -->

      <path d="M100 110 Q75 95 55 82" fill="none" stroke="#c9a09a" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M105 75 Q128 58 148 50" fill="none" stroke="#c9a09a" stroke-width="1.5" stroke-linecap="round"/>

      <!-- Blossom helper -->

        <ellipse cx="0" cy="-10" rx="5" ry="8.5" fill="#fbdae3" transform="rotate(236)"/>
        <ellipse cx="0" cy="-10" rx="5" ry="8.5" fill="#fce8ed" transform="rotate(308)"/>

      <!-- Blossom 3 – left sub -->

        <ellipse cx="0" cy="-10" rx="5" ry="8.5" fill="#fce8ed" transform="rotate(10)"/>
        <ellipse cx="0" cy="-10" rx="5" ry="8.5" fill="#fbdae3" transform="rotate(82)"/>
        <ellipse cx="0" cy="-10" rx="5" ry="8.5" fill="#fce8ed" transform="rotate(154)"/>
        <ellipse cx="0" cy="-10" rx="5" ry="8.5" fill="#fbdae3" transform="rotate(226)"/>
        <ellipse cx="0" cy="-10" rx="5" ry="8.5" fill="#fce8ed" transform="rotate(298)"/>
        <circle cx="0" cy="0" r="3" fill="#f9c0cf"/>
      </g>

      <!-- Blossom 4 -->
      <g transform="translate(45,155)">

        <ellipse cx="0" cy="-9" rx="4.5" ry="7.5" fill="#fbdae3" transform="rotate(72)"/>
        <ellipse cx="0" cy="-9" rx="4.5" ry="7.5" fill="#fce8ed" transform="rotate(144)"/>
        <ellipse cx="0" cy="-9" rx="4.5" ry="7.5" fill="#fbdae3" transform="rotate(216)"/>
        <ellipse cx="0" cy="-9" rx="4.5" ry="7.5" fill="#fce8ed" transform="rotate(288)"/>

      <!-- Blossom 5 – right sub -->

        <ellipse cx="0" cy="-10" rx="5" ry="8.5" fill="#fce8ed" transform="rotate(303)"/>
        <circle cx="0" cy="0" r="3" fill="#f9c0cf"/>
      </g>

      <!-- Blossom 6 – left tip -->
      <g transform="translate(55,82)">
        <ellipse cx="0" cy="-9" rx="4.5" ry="7.5" fill="#fbdae3" transform="rotate(5)"/>
        <ellipse cx="0" cy="-9" rx="4.5" ry="7.5" fill="#fce8ed" transform="rotate(77)"/>
        <ellipse cx="0" cy="-9" rx="4.5" ry="7.5" fill="#fbdae3" transform="rotate(149)"/>
        <ellipse cx="0" cy="-9" rx="4.5" ry="7.5" fill="#fce8ed" transform="rotate(221)"/>
        <ellipse cx="0" cy="-9" rx="4.5" ry="7.5" fill="#fbdae3" transform="rotate(293)"/>
        <circle cx="0" cy="0" r="2.8" fill="#f9c0cf"/>
      </g>

      <!-- Leaf accents -->
      <ellipse cx="92" cy="115" rx="8" ry="4" fill="#c8ddc0" opacity="0.7" transform="rotate(-35,92,115)"/>
      <ellipse cx="102" cy="72" rx="7" ry="3.5" fill="#c8ddc0" opacity="0.6" transform="rotate(20,102,72)"/>
      <ellipse cx="88" cy="185" rx="7" ry="3.5" fill="#c8ddc0" opacity="0.6" transform="rotate(-50,88,185)"/>

      <!-- Buds -->
      <ellipse cx="97" cy="95" rx="4" ry="6.5" fill="#f9c0cf" transform="rotate(-10,97,95)"/>
      <ellipse cx="108" cy="58" rx="3.5" ry="5.5" fill="#fbdae3" transform="rotate(15,108,58)"/>
    </svg>
  </div>

  <!-- ══ CENTER MESSAGE ══ -->
  <div class="center">
    <p class="sorry">I am so sorry,</p>
    <p class="name">Aliss.</p>
    <div class="dot"></div>

  <!-- ══ ROSE (right) ══ -->

    <svg viewBox="0 0 200 340" xmlns="http://www.w3.org/2000/svg" aria-label="Rose">

      <path d="M100 200 Q135 178 148 155 Q128 165 100 200Z" fill="#88bb78" opacity="0.85"/>

      <ellipse cx="100" cy="92" rx="22" ry="16" fill="#e8697e" transform="rotate(-15,100,92)" opacity="0.9"/>
      <ellipse cx="100" cy="92" rx="22" ry="16" fill="#e8697e" transform="rotate(30,100,92)" opacity="0.85"/>

      <!-- Mid petals -->
      <ellipse cx="100" cy="92" rx="16" ry="12" fill="#e87a8c" transform="rotate(10,100,92)"/>
      <ellipse cx="100" cy="92" rx="16" ry="12" fill="#dd6878" transform="rotate(62,100,92)"/>
      <ellipse cx="100" cy="92" rx="16" ry="12" fill="#e87a8c" transform="rotate(114,100,92)"/>
      <ellipse cx="100" cy="92" rx="16" ry="12" fill="#dd6878" transform="rotate(166,100,92)"/>
      <ellipse cx="100" cy="92" rx="16" ry="12" fill="#e87a8c" transform="rotate(218,100,92)"/>

      <!-- Inner petals -->
      <ellipse cx="100" cy="92" rx="10" ry="8" fill="#f29aaa" transform="rotate(0,100,92)"/>

      <!-- Tight center spiral -->

  </div>

</div>

<!-- ═══════ Falling petals ═══════ -->
<script>
const canvas = document.getElementById('petals');
const ctx = canvas.getContext('2d');

function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
resize();
window.addEventListener('resize', resize);

const COLORS = ['#fce8ed','#fbdae3','#f9c0cf','#f4b8c4','#e8c5ca','#fae0e5','#f5d0d8'];
const petals = [];

function mkPetal() {
  return {
    x: Math.random() * innerWidth,
    y: -16,
    r: Math.random() * 7 + 4,
    rx: Math.random() * 5 + 3,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    vx: (Math.random() - 0.5) * 0.5,
    vy: Math.random() * 0.7 + 0.3,
    rot: Math.random() * Math.PI * 2,
    rSpeed: (Math.random() - 0.5) * 0.018,
    swing: Math.random() * Math.PI * 2,
    swingS: Math.random() * 0.008 + 0.004,
    alpha: Math.random() * 0.45 + 0.25,
  };
}

for (let i = 0; i < 28; i++) {
  const p = mkPetal(); p.y = Math.random() * innerHeight;
  petals.push(p);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (Math.random() < 0.03 && petals.length < 55) petals.push(mkPetal());

  for (let i = petals.length - 1; i >= 0; i--) {
    const p = petals[i];
    p.swing += p.swingS;
    p.x += p.vx + Math.sin(p.swing) * 0.35;
    p.y += p.vy;
    p.rot += p.rSpeed;

    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, p.rx, p.r, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    if (p.y > canvas.height + 20) petals.splice(i, 1, mkPetal());
  }
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
